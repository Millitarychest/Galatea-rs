<div class="page-header">
    <h2>Fleet Overview</h2>
    <p>Monitor all connected Galatea agents</p>
</div>

<div class="stats-grid">
    <div class="stat-card">
        <div class="label">Total Agents</div>
        <div class="value blue">{total_agents}</div>
    </div>
    <div class="stat-card">
        <div class="label">Online</div>
        <div class="value green">{online_count}</div>
    </div>
    <div class="stat-card">
        <div class="label">Stale</div>
        <div class="value yellow">{stale_count}</div>
    </div>
    <div class="stat-card">
        <div class="label">Offline</div>
        <div class="value red">{offline_count}</div>
    </div>
</div>

<div class="table-container">
    <div class="table-header">
        <h3>Agents</h3>
    </div>
    <table>
        <thead>
            <tr>
                <th>Status</th>
                <th>Hostname</th>
                <th>Agent ID</th>
                <th>OS</th>
                <th>Version</th>
                <th>IP Address</th>
                <th>Last Heartbeat</th>
            </tr>
        </thead>
        <tbody>
            {agent_rows}
        </tbody>
    </table>
</div>
